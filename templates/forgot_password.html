<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Admin Password - Logistics CRM</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .card {
            background: white;
            width: 100%;
            max-width: 440px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
            padding: 40px 35px;
        }

        .header {
            text-align: center;
            margin-bottom: 35px;
        }

        .header i {
            font-size: 52px;
            color: #ef4444;
            margin-bottom: 15px;
        }

        .header h1 {
            font-size: 26px;
            color: #1e40af;
            margin-bottom: 8px;
        }

        .header p {
            color: #64748b;
            font-size: 15px;
        }

        .input-group {
            position: relative;
            margin-bottom: 22px;
        }

        .input-group i {
            position: absolute;
            left: 15px;
            top: 14px;
            color: #64748b;
        }

        input {
            width: 100%;
            padding: 14px 16px 14px 48px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        input:focus {
            border-color: #3b82f6;
            outline: none;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15);
        }

        .btn {
            width: 100%;
            padding: 15px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 15px;
            transition: all 0.3s ease;
        }

        .btn:hover {
            background: #1d4ed8;
            transform: translateY(-2px);
        }

        .note {
            text-align: center;
            margin-top: 25px;
            font-size: 14px;
            color: #64748b;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="header">
            <i class="fas fa-key"></i>
            <h1>Reset Admin Password</h1>
            <p>Enter your details to reset password</p>
        </div>

        <form action="/reset_password" method="POST">
            
            <div class="input-group">
                <i class="fas fa-user"></i>
                <input 
                    type="text" 
                    name="username" 
                    placeholder="Username" 
                    required>
            </div>

            <div class="input-group">
                <i class="fas fa-fingerprint"></i>
                <input 
                    type="text" 
                    name="secret_code" 
                    placeholder="Secret Code" 
                    required>
            </div>

            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input 
                    type="password" 
                    name="new_password" 
                    placeholder="New Password" 
                    required>
            </div>

            <button type="submit" class="btn">
                <i class="fas fa-redo"></i> Reset Password
            </button>
        </form>

        <div class="note">
            New password must be at least 6 characters long
        </div>
    </div>
</body>
</html>
