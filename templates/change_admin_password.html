{% extends "base.html" %}

{% block title %}Change Admin Password - Logistics CRM{% endblock %}

{% block page_title %}Change Admin Password{% endblock %}

{% block content %}
<div style="max-width: 480px; margin: 0 auto;">
    <div style="background: white; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.08); padding: 40px 35px;">
        
        <div style="text-align: center; margin-bottom: 35px;">
            <i class="fas fa-shield-alt" style="font-size: 48px; color: #3b82f6; margin-bottom: 15px;"></i>
            <p style="color: #64748b;">Keep your account secure</p>
        </div>

        <form action="/update_admin_password" method="POST">
            
            <div style="position: relative; margin-bottom: 22px;">
                <i class="fas fa-lock" style="position: absolute; left: 15px; top: 14px; color: #64748b;"></i>
                <input 
                    type="password" 
                    name="current_password" 
                    placeholder="Current Password" 
                    required
                    style="width: 100%; padding: 14px 16px 14px 48px; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 16px;">
            </div>

            <div style="position: relative; margin-bottom: 22px;">
                <i class="fas fa-key" style="position: absolute; left: 15px; top: 14px; color: #64748b;"></i>
                <input 
                    type="password" 
                    name="new_password" 
                    placeholder="New Password" 
                    required
                    style="width: 100%; padding: 14px 16px 14px 48px; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 16px;">
            </div>

            <button type="submit" 
                    style="width: 100%; padding: 15px; background: #2563eb; color: white; border: none; border-radius: 12px; font-size: 17px; font-weight: 600; cursor: pointer;">
                <i class="fas fa-save"></i> Update Password
            </button>
        </form>

        <div style="text-align: center; margin-top: 25px; font-size: 14px; color: #64748b;">
            Password must be at least 6 characters long
        </div>
    </div>
</div>
{% endblock %}
