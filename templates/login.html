<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logistics CRM - Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-box {
            background: white;
            padding: 40px 35px;
            border-radius: 20px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
        }

        .tabs {
            display: flex;
            background: #f1f5f9;
            border-radius: 12px;
            padding: 6px;
            margin-bottom: 35px;
        }

        .tab {
            flex: 1;
            padding: 14px;
            text-align: center;
            font-weight: 600;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .tab.active {
            background: #2563eb;
            color: white;
            box-shadow: 0 4px 10px rgba(37, 99, 235, 0.3);
        }

        .logo {
            text-align: center;
            margin-bottom: 10px;
        }

        .logo i {
            font-size: 48px;
            color: #3b82f6;
        }

        h2 {
            text-align: center;
            color: #1e2937;
            margin-bottom: 30px;
            font-size: 24px;
        }

        .input-group {
            position: relative;
            margin-bottom: 22px;
        }

        .input-group i {
            position: absolute;
            left: 15px;
            top: 14px;
            color: #64748b;
        }

        input {
            width: 100%;
            padding: 14px 16px 14px 48px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 16px;
        }

        input:focus {
            border-color: #3b82f6;
            outline: none;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15);
        }

        .btn {
            width: 100%;
            padding: 15px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }

        .btn:hover {
            background: #1d4ed8;
        }

        .footer-text {
            text-align: center;
            margin-top: 25px;
            color: #64748b;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="logo">
            <i class="fas fa-truck"></i>
        </div>
        <h2>Logistics CRM</h2>

        <!-- Role Selection Tabs -->
        <div class="tabs">
            <div class="tab active" id="adminTab" onclick="selectRole('admin')">
                <i class="fas fa-user-shield"></i> Admin
            </div>
            <div class="tab" id="employeeTab" onclick="selectRole('employee')">
                <i class="fas fa-users"></i> Employee
            </div>
        </div>

        <form action="/login_check" method="POST" id="loginForm">
            <input type="hidden" name="role" id="roleInput" value="admin">
            <br>


            <div class="input-group">
                <i class="fas fa-user"></i>
                <input 
                    type="text" 
                    name="username" 
                    placeholder="Username" 
                    required>
            </div>

            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input 
                    type="password" 
                    name="password" 
                    placeholder="Password" 
                    required>
            </div>

            <button type="submit" class="btn">
                <i class="fas fa-sign-in-alt"></i> Login
            </button>
        </form>

        <div class="footer-text">
    <a href="/forgot_password"
       style="color:#3b82f6; text-decoration:none;">
       Forgot Password?
    </a>
</div>
    </div>

    <script>
        function selectRole(role) {
            // Remove active class from both tabs
            document.getElementById('adminTab').classList.remove('active');
            document.getElementById('employeeTab').classList.remove('active');
            
            // Add active class to selected tab
            if (role === 'admin') {
                document.getElementById('adminTab').classList.add('active');
            } else {
                document.getElementById('employeeTab').classList.add('active');
            }
            
            // Set hidden input value
            document.getElementById('roleInput').value = role;
        }
    </script>
</body>
</html>
