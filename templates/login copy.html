<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logistics CRM - Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .login-box {
            background: white;
            padding: 40px 35px;
            border-radius: 20px;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
            transition: all 0.3s ease;
        }

        .login-box:hover {
            transform: translateY(-5px);
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo i {
            font-size: 52px;
            color: #3b82f6;
            margin-bottom: 12px;
        }

        .logo h1 {
            font-size: 26px;
            color: #1e40af;
            font-weight: 700;
        }

        .logo p {
            color: #64748b;
            font-size: 15px;
        }

        h2 {
            text-align: center;
            color: #1e2937;
            margin-bottom: 30px;
            font-size: 24px;
        }

        .input-group {
            position: relative;
            margin-bottom: 22px;
        }

        .input-group i {
            position: absolute;
            left: 15px;
            top: 14px;
            color: #64748b;
        }

        input, select {
            width: 100%;
            padding: 14px 16px 14px 48px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        input:focus, select:focus {
            border-color: #3b82f6;
            outline: none;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15);
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.3s ease;
        }

        .btn:hover {
            background: #1d4ed8;
            transform: translateY(-2px);
        }

        .footer-text {
            text-align: center;
            margin-top: 25px;
            color: #64748b;
            font-size: 14px;
        }

        @media (max-width: 480px) {
            .login-box {
                margin: 15px;
                padding: 30px 25px;
            }
        }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="logo">
            <i class="fas fa-truck"></i>
            <h1>Logistics CRM</h1>
            <p>Manage Shipments Efficiently</p>
        </div>

        <h2>Welcome Back</h2>

        <form action="/login_check" method="POST">
            
            <div class="input-group">
                <i class="fas fa-user"></i>
                <input 
                    type="text" 
                    name="username" 
                    placeholder="Username" 
                    required>
            </div>

            <div class="input-group">
                <i class="fas fa-user-shield"></i>
                <select name="role" required>
                    <option value="">Select Role</option>
                    <option value="admin">Admin</option>
                    <option value="employee">Employee</option>
                </select>
            </div>

            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input 
                    type="password" 
                    name="password" 
                    placeholder="Password" 
                    required>
            </div>

            <button type="submit" class="btn">
                <i class="fas fa-sign-in-alt"></i> Login
            </button>
        </form>

        <div class="footer-text">
            Forgot Password? <a href="#" style="color:#3b82f6; text-decoration:none;">Reset Here</a>
        </div>
    </div>
</body>
</html>
