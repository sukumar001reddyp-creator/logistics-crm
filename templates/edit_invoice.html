<!DOCTYPE html>
<html>
<head>
    <title>Edit Invoice</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,sans-serif;
        }

        body{
            background:#f8fafc;
        }

        .container{
            display:flex;
            min-height:100vh;
        }

        .sidebar{
            width:220px;
            background:#0f172a;
            color:white;
            padding:20px;
        }

        .logo{
            font-size:28px;
            font-weight:bold;
            margin-bottom:40px;
        }

        .menu{
            list-style:none;
        }

        .menu li{
            padding:15px;
            margin-bottom:10px;
            border-radius:10px;
            cursor:pointer;
        }

        .menu li:hover{
            background:#1e293b;
        }

        .main{
            flex:1;
            padding:30px;
        }

        .title{
            font-size:36px;
            font-weight:bold;
            margin-bottom:30px;
        }

        .form-box{
            background:white;
            padding:30px;
            border-radius:15px;
            box-shadow:0 2px 10px rgba(0,0,0,.08);
            max-width:800px;
        }

        .form-group{
            margin-bottom:20px;
        }

        label{
            display:block;
            margin-bottom:8px;
            font-weight:bold;
        }

        input, select{
            width:100%;
            padding:12px;
            border:1px solid #ddd;
            border-radius:8px;
        }

        .btn{
            background:#2563eb;
            color:white;
            border:none;
            padding:12px 20px;
            border-radius:8px;
            cursor:pointer;
        }

    </style>

</head>

<body>

<div class="container">

    <div class="sidebar">

        <div class="logo">
            Logistics CRM
        </div>

        <ul class="menu">

            <li onclick="window.location='/'">
                Dashboard
            </li>

            <li onclick="window.location='/clients'">
                Clients
            </li>

            <li onclick="window.location='/shipments'">
                Shipments
            </li>

            <li onclick="window.location='/invoices'">
                Invoices
            </li>

            <li onclick="window.location='/logout'">
                Logout
            </li>

        </ul>

    </div>

    <div class="main">

        <div class="title">
            Edit Invoice
        </div>

        <div class="form-box">

            <form action="/update_invoice/{{ invoice[0] }}" method="POST">

                <div class="form-group">
                    <label>Invoice Number</label>
                    <input
                        type="text"
                        name="invoice_no"
                        value="{{ invoice[1] }}"
                        required
                    >
                </div>

                <div class="form-group">
                    <label>Client Name</label>
                    <input
                        type="text"
                        name="client_name"
                        value="{{ invoice[2] }}"
                        required
                    >
                </div>

                <div class="form-group">
                    <label>Amount</label>
                    <input
                        type="number"
                        name="amount"
                        value="{{ invoice[3] }}"
                        required
                    >
                </div>

                <div class="form-group">
                    <label>Invoice Date</label>
                    <input
                        type="date"
                        name="invoice_date"
                        value="{{ invoice[4] }}"
                        required
                    >
                </div>

                <div class="form-group">
                    <label>Status</label>

                    <select name="status">

                        <option
                            {% if invoice[5] == 'Paid' %}selected{% endif %}
                        >
                            Paid
                        </option>

                        <option
                            {% if invoice[5] == 'Unpaid' %}selected{% endif %}
                        >
                            Unpaid
                        </option>

                    </select>

                </div>

                <button class="btn" type="submit">
                    Update Invoice
                </button>

            </form>

        </div>

    </div>

</div>

</body>
</html>
