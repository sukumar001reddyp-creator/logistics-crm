<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f8fafc 0%, #e0f2fe 100%);
            min-height: 100vh;
            padding: 30px 20px;
            color: #1e2937;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 2px solid #e2e8f0;
        }

        .header h1 {
            font-size: 38px;
            font-weight: 700;
            color: #1e40af;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header h1 i {
            color: #3b82f6;
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 24px;
            margin-bottom: 40px;
        }

        .card {
            background: white;
            padding: 32px 28px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
            transition: all 0.3s ease;
            text-align: center;
            border: 1px solid #f1f5f9;
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 35px rgba(0, 0, 0, 0.12);
        }

        .card i {
            font-size: 42px;
            margin-bottom: 16px;
            color: #3b82f6;
        }

        .card h2 {
            font-size: 42px;
            font-weight: 700;
            color: #1e40af;
            margin-bottom: 8px;
            line-height: 1;
        }

        .card p {
            color: #64748b;
            font-size: 17px;
            font-weight: 500;
        }

        .total .card h2 { color: #1e40af; }
        .pending .card h2 { color: #f59e0b; }
        .delivered .card h2 { color: #10b981; }

        .actions {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 14px 32px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            border: none;
        }

        .btn-primary {
            background: #3b82f6;
            color: white;
        }

        .btn-primary:hover {
            background: #2563eb;
            transform: translateY(-2px);
        }

        .btn-danger {
            background: #ef4444;
            color: white;
        }

        .btn-danger:hover {
            background: #dc2626;
            transform: translateY(-2px);
        }

        @media (max-width: 768px) {
            .cards {
                grid-template-columns: 1fr;
            }
            
            .header h1 {
                font-size: 32px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>
                <i class="fas fa-tachometer-alt"></i>
                Employee Dashboard
            </h1>
        </div>

        <div class="cards">
            <!-- Total Shipments -->
            <div class="card total">
                <i class="fas fa-boxes"></i>
                <h2>{{ total_shipments }}</h2>
                <p>Total Shipments</p>
            </div>

            <!-- Pending Shipments -->
            <div class="card pending">
                <i class="fas fa-clock"></i>
                <h2>{{ pending_shipments }}</h2>
                <p>Pending Shipments</p>
            </div>

            <!-- Delivered Shipments -->
            <div class="card delivered">
                <i class="fas fa-truck"></i>
                <h2>{{ delivered_shipments }}</h2>
                <p>Delivered Shipments</p>
            </div>
        </div>

        <div class="actions">
            <button 
                class="btn btn-primary"
                onclick="window.location='/shipments'">
                <i class="fas fa-list"></i>
                View All Shipments
            </button>
            
            <button 
                class="btn btn-danger"
                onclick="window.location='/employee_logout'">
                <i class="fas fa-sign-out-alt"></i>
                Logout
            </button>
        </div>
    </div>
</body>
</html>
